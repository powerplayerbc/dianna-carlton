server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent browser caching of all pages
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;

    # Meta Pixel — injected site-wide into every HTML response (all current AND
    # future pages) so individual page HTML never carries the snippet. Pixel ID
    # 1055922853615612; base code lives in /js/meta-pixel.js (one source of truth).
    # sub_filter only touches text/html (default sub_filter_types), so the .js
    # asset itself is never rewritten. New pages added to the repo are covered
    # automatically with no edit required.
    sub_filter_once on;
    sub_filter '</head>' '<script src="/js/meta-pixel.js"></script><noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1055922853615612&ev=PageView&noscript=1"/></noscript></head>';

    # Email-confirmation: verify SERVER-SIDE (no client JS needed, works on any
    # device incl. locked-down iOS). The visitor only ever touches this brand
    # domain; nginx proxies to the n8n webhook, which 307-redirects back to a
    # same-domain page. Exact matches so static files never shadow this.
    location = /confirm  { proxy_pass https://n8n.carltonaiservices.com/webhook/dianna-confirm-email; proxy_ssl_server_name on; proxy_set_header Host n8n.carltonaiservices.com; }
    location = /confirm/ { proxy_pass https://n8n.carltonaiservices.com/webhook/dianna-confirm-email; proxy_ssl_server_name on; proxy_set_header Host n8n.carltonaiservices.com; }

    # Unsubscribe: the /unsubscribe page POSTs here (same-origin, so no CORS and the
    # raw n8n URL is never exposed). nginx proxies to the DIANNA-UNSUBSCRIBE webhook,
    # which flips do_not_contact=true / opted_in=false for the email.
    location = /api/unsubscribe { proxy_pass https://n8n.carltonaiservices.com/webhook/dianna-unsubscribe; proxy_ssl_server_name on; proxy_set_header Host n8n.carltonaiservices.com; }

    # Clean directory URLs: /group-coaching/ -> /group-coaching/index.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
