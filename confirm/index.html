<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirming Your Email | Dianna Carlton</title>
    <meta name="description" content="Confirming your email and unlocking your free download library.">
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #C2410C; --primary-glow: #EA580C; --warm: #B08D57; --deep: #5B3A52;
            --bg: #FBF7F0; --surface: #FFFFFF; --text: #2B2420; --text-muted: #6B5D52;
            --heading-font: 'Fraunces', 'Georgia', serif; --body-font: 'Inter', system-ui, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: var(--body-font);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
            -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 480px; padding: 2rem 1.5rem; }
        .font-heading { font-family: var(--heading-font); font-weight: 600; letter-spacing: -0.015em; }
        .ring {
            width: 64px; height: 64px; margin: 0 auto 1.75rem; border-radius: 50%;
            border: 4px solid rgba(194,65,12,0.18); border-top-color: var(--primary);
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 1.7rem; margin-bottom: 0.6rem; color: var(--text); }
        p { font-size: 1rem; line-height: 1.6; color: var(--text-muted); }
        .cta-btn {
            display: none; margin-top: 1.5rem; background: var(--primary); color: #fff; font-weight: 600;
            padding: 0.85rem 2rem; border-radius: 999px; text-decoration: none; font-size: 1rem;
        }
        .err .ring { display: none; }
        .err .cta-btn { display: inline-block; }
    </style>
</head>
<body>
    <div class="wrap" id="wrap">
        <div class="ring" aria-hidden="true"></div>
        <h1 class="font-heading" id="title">Confirming your email&hellip;</h1>
        <p id="msg">One moment while we unlock your free download library.</p>
        <a class="cta-btn" id="retry" href="/resources/">Back to sign up</a>
    </div>

    <script>
        (function () {
            var CONFIRM_API = 'https://n8n.carltonaiservices.com/webhook/dianna-confirm-email';
            var params = new URLSearchParams(location.search);
            var token = (params.get('token') || '').trim();

            function fail(message) {
                document.getElementById('wrap').classList.add('err');
                document.getElementById('title').textContent = 'Hmm, that didn’t work';
                document.getElementById('msg').textContent = message || 'That confirmation link looks expired or already used. Pop your email in again and we’ll send a fresh one.';
            }

            if (!token) { location.replace('/resources/?confirm=invalid'); return; }

            var done = false;
            var timer = setTimeout(function () { if (!done) fail('This is taking longer than expected. Please try the link again, or sign up once more.'); }, 15000);

            fetch(CONFIRM_API + '?token=' + encodeURIComponent(token), { method: 'GET' })
                .then(function (r) { return r.json().catch(function () { return {}; }); })
                .then(function (data) {
                    done = true; clearTimeout(timer);
                    if (data && data.redirect) { location.replace(data.redirect); }
                    else { location.replace('/resources/?confirm=invalid'); }
                })
                .catch(function () {
                    done = true; clearTimeout(timer);
                    fail();
                });
        })();
    </script>
</body>
</html>
